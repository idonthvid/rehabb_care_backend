name: Deploy Backend to Lambda

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Serverless v3
        run: npm install -g serverless@3

      - name: Deploy to AWS Lambda
        run: serverless deploy
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          APPOINTMENTS_SCRIPT_URL: ${{ secrets.APPOINTMENTS_SCRIPT_URL }}
          CONSULTATIONS_SCRIPT_URL: ${{ secrets.CONSULTATIONS_SCRIPT_URL }}
          PARTNERS_SCRIPT_URL: ${{ secrets.PARTNERS_SCRIPT_URL }}
